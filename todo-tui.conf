# todo-tui.conf
# Place this file at ~/.config/todo-tui/todo-tui.conf

# File name can be changed like this:
# $FILE = MyCustomTodo

# Set a persistent file path (instead of ./TODO_tui.md):
# file-path = ~/Documents/

# Or use commands to save/load the file remotely.
# Two env vars are exported to the shell:
#   $TODO_PATH — temporary local dir holding the file
#   $TODO_FILE — the base file name (without .md), same as $FILE above
# When file-path is empty and a file-cmd-* is set, the local mirror is
# stored at ~/.cache/todo-tui/<name>.md instead of the current directory.
# file-cmd-save = rclone copy "$TODO_PATH/$TODO_FILE.md" gdrive:docs/
# file-cmd-load = rclone copy "gdrive:docs/$TODO_FILE.md" "$TODO_PATH/"

# Log every deleted item to a history file. Each delete appends one line:
#   YYYY-MM-DD HH:MM <item text>
# Parent directory is auto-created. If unset, no history is kept.
# history-file = ~/Documents/todo-tui-history.txt
